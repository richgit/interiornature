backend:
  name: github
  repo: richgit/interiornature
  branch: main
base_url: https://sveltia-cms-auth.richardjware.workers.dev/
media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "content/home.json"
        label: "Home Page Content"
        name: "home"
        fields:
          - { label: "Main Headline", name: "headline", widget: "string" }

