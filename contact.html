<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Interior Nature</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1a1a1a;
            --text-main: #f0f0f0;
            --text-muted: #a0a0a0;
            --accent: #c2b280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            text-decoration: none;
        }

.logo-img {
            height: 150px; /* You can increase or decrease this to change the logo size */
            width: auto;
            object-fit: contain;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        nav a:hover, nav a.active {
            color: var(--text-main);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 4rem 5%;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .contact-card {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border: 1px solid #222;
            width: 100%;
            margin-bottom: 2rem;
        }

        .contact-item {
            margin-bottom: 1.2rem;
        }

        .contact-item:last-child {
            margin-bottom: 0;
        }

        .label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 0.3rem;
        }

        .value {
            font-size: 1.1rem;
            color: var(--text-main);
            text-decoration: none;
        }

        a.value:hover {
            color: var(--accent);
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid #222;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .contact-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
<a href="index.html" class="logo-container">
            <img src="images/logo.png" alt="Interior Nature" class="logo-img">
        </a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Let's Build Something Living</h1>
        <p>Get in touch for custom ecosystem design, installations, maintenance inquiries, or upcoming terrarium workshops.</p>

        <div class="contact-card">
            <div class="contact-item">
                <span class="label">Phone</span>
                <a href="tel:0273862945" class="value">027 386 2945</a>
            </div>
            <br>
            <div class="contact-item">
                <span class="label">Email</span>
                <a href="mailto:charlie@interiornature.co.nz" class="value">charlie@interiornature.co.nz</a>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Interior Nature. All rights reserved.
    </footer>

</body>
</html>
